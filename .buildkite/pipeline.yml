steps:
  - group: ":test_tube: Tests"
    steps:
      - label: ":julia: :linux: CUDA Julia v{{matrix.version}} -- {{matrix.group}} -- {{matrix.runtime}}"
        matrix:
          setup:
            version:
              - "1.12"
            group:
              - core
              - nn
              - integration
            runtime:
              - "PJRT"
              - "IFRT"
        plugins:
          - JuliaCI/julia#v1:
              version: "{{matrix.version}}"
          - JuliaCI/julia-coverage#v1:
              codecov: true
              dirs:
                - src
                - ext
                - lib/ReactantCore/src
        commands: |
          touch LocalPreferences.toml

          echo "[Reactant]" >> LocalPreferences.toml
          echo "xla_runtime = \"{{matrix.runtime}}\"" >> LocalPreferences.toml

          cat LocalPreferences.toml

          julia --project=. -e 'println("--- :julia: Instantiating project")
              using Pkg
              Pkg.develop([PackageSpec(path="lib/ReactantCore")])'

          julia --project=. -e 'println("--- :julia: Run Tests")
              using Pkg
              Pkg.test(; coverage="user", test_args=["{{matrix.group}}"])'
        agents:
          queue: "cuda"
        env:
          JULIA_DEBUG: "Reactant,Reactant_jll"
          CUDA_VISIBLE_DEVICES: 0
          REACTANT_BACKEND_GROUP: "GPU"
        if: build.message !~ /\[skip tests\]/
        timeout_in_minutes: 120

      - label: ":julia: :apple: Metal Julia v{{matrix.version}} -- plugins/metal"
        matrix:
          setup:
            version:
              - "1.12"
        plugins:
          - JuliaCI/julia#v1:
              version: "{{matrix.version}}"
          - JuliaCI/julia-coverage#v1:
              codecov: true
              dirs:
                - src
                - ext
        commands: |
          julia -e 'println("--- :julia: Setting up Metal test environment")
              using Pkg
              Pkg.activate("metal_test_env")
              Pkg.develop([PackageSpec(path="."), PackageSpec(path="lib/ReactantCore")])
              # Released Metal.jl (<= 1.9.3) caps GPUCompiler below Reactant's
              # requirement (>= 1.17 since #2963). Pin the Metal.jl commit that
              # bumped GPUCompiler until a release including it is tagged.
              Pkg.add(url="https://github.com/JuliaGPU/Metal.jl", rev="9a9d568d2895800a47edc36972b162cbd2db70ea")
              Pkg.add(["Enzyme", "Lux", "Random", "Test"])'

          julia --project=metal_test_env --code-coverage=user -e 'println("--- :julia: Run Metal plugin tests")
              include("test/plugins/metal.jl")'
        agents:
          queue: "juliaecosystem"
          os: "macos"
          arch: "aarch64"
        env:
          JULIA_DEBUG: "Reactant,Reactant_jll"
        if: build.message !~ /\[skip tests\]/ && build.message !~ /\[skip metal\]/
        timeout_in_minutes: 60

